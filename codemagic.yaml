# Codemagic CI — build Physical for iOS on a cloud Mac and ship to TestFlight,
# no Mac required. See "All readmes/IOS_DEPLOY.md" for the full walkthrough.
#
# BEFORE the first build, configure THREE things (one-time):
#   1. Apple Developer Program enrollment ($99/yr) — developer.apple.com.
#   2. In App Store Connect, create the app with bundle id
#      `com.cemiloglu.physical`, then copy its numeric "Apple ID" into
#      APP_STORE_APPLE_ID below.
#   3. In Codemagic → Teams → Integrations, add an *App Store Connect API key*
#      and name it `codemagic_asc` (or change the name under `integrations`).
# Then push to GitHub (or hit Start build) — Codemagic signs + uploads to TestFlight.

workflows:
  ios-testflight:
    name: iOS · TestFlight
    max_build_duration: 90
    instance_type: mac_mini_m2          # Codemagic's cloud macOS machine
    integrations:
      app_store_connect: codemagic_asc  # ← the API key name you set in Codemagic
    environment:
      groups:
        - ios_signing   # Codemagic env-var group holding CERTIFICATE_PRIVATE_KEY (secure)
      vars:
        BUNDLE_ID: "com.cemiloglu.physical"
        APP_STORE_APPLE_ID: 6783269531  # your app's numeric Apple ID (App Store Connect)
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing (creates the cert + App Store profile if missing)
        script: |
          # Signing from scratch on a brand-new Apple account. Apple never stores
          # the certificate's private key, so we supply our own (CERTIFICATE_PRIVATE_KEY,
          # a secure env var) — fetch-signing-files --create then makes the iOS
          # distribution certificate + App Store profile via the codemagic_asc API key.
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;
      - name: Analyze
        script: flutter analyze
        ignore_failure: true
      - name: Test
        script: flutter test
        ignore_failure: true
      - name: Build signed IPA
        script: |
          # $BUILD_NUMBER is Codemagic's own auto-incrementing counter — robust
          # from the very first build (no App Store Connect query needed).
          # BACKEND_URL points the iPhone build at the hosted backend (not localhost).
          flutter build ipa --release \
            --build-name=0.1.1 \
            --build-number=$BUILD_NUMBER \
            --dart-define=BACKEND_URL=https://physical-production-883c.up.railway.app \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true      # internal testers get it once Apple finishes processing
