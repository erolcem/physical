name: physical
description: Physical — measure every trainable dimension, ranked against the population.
publish_to: "none"
version: 0.1.1+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.3.2
  fl_chart: ^1.2.0
  http: ^1.2.0
  url_launcher: ^6.3.2
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  record: ^6.0.0          # mic capture for the Voice aesthetic measurement
  path_provider: ^2.1.4   # temp file path for the recorded clip
  image_picker: ^1.1.2    # camera capture for skin/oral/hair photo measurements

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.25.0
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1   # generates the iOS app icon from app_icon.png

# Run: dart run flutter_launcher_icons   (regenerates ios/Runner AppIcon set)
flutter_launcher_icons:
  ios: true
  remove_alpha_ios: true
  image_path: "assets/brand/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/badges/
    - assets/brand/
